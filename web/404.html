<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — Lost in Space | P D S Aravind Kumar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      background: #0B0F19;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      overscroll-behavior: none;
    }
    body { display: flex; align-items: center; justify-content: center; position: relative; }
    .aurora1, .aurora2 {
      position: absolute; border-radius: 50%; pointer-events: none;
    }
    .aurora1 {
      width: 60vmax; height: 60vmax; left: -20vmax; top: -25vmax;
      background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, transparent 65%);
    }
    .aurora2 {
      width: 70vmax; height: 70vmax; right: -25vmax; bottom: -35vmax;
      background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 65%);
    }
    .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.2; } }
    .content { position: relative; text-align: center; z-index: 2; padding: 24px; }
    .astronaut {
      font-size: 88px; display: inline-block;
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(139,92,246,0.45));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50%      { transform: translateY(-26px) rotate(8deg); }
    }
    h1 {
      margin-top: 18px;
      font-size: clamp(64px, 12vw, 120px); font-weight: 800; letter-spacing: -2px; line-height: 1;
      background: linear-gradient(100deg, #FFFFFF 15%, #B8BCFF 50%, #E8E9FF 85%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h2 { margin-top: 10px; font-size: clamp(20px, 4vw, 30px); color: #818CF8; font-weight: 600; }
    p { margin-top: 14px; color: rgba(255,255,255,0.55); font-size: 16px; line-height: 1.7; }
    .home-btn {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 34px; padding: 15px 34px; border-radius: 40px;
      background: rgba(99,102,241,0.28);
      border: 1px solid rgba(158,163,255,0.45);
      color: #fff; font-size: 16px; font-weight: 600; text-decoration: none;
      box-shadow: 0 10px 40px rgba(99,102,241,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .home-btn:hover {
      transform: translateY(-2px);
      background: rgba(99,102,241,0.42);
      box-shadow: 0 14px 50px rgba(99,102,241,0.4);
    }
  </style>
</head>
<body>
  <div class="aurora1"></div>
  <div class="aurora2"></div>
  <div class="content">
    <span class="astronaut">🧑‍🚀</span>
    <h1>404</h1>
    <h2>Houston, we have a problem.</h2>
    <p>This page drifted off into deep space —<br>but my portfolio is still in orbit.</p>
    <a class="home-btn" href="/">🚀&nbsp; Take me home</a>
  </div>
  <script>
    const rand = (a, b) => a + Math.random() * (b - a);
    for (let i = 0; i < 70; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = rand(1, 2.5);
      s.style.width = s.style.height = size + 'px';
      s.style.left = rand(0, 100) + 'vw';
      s.style.top = rand(0, 100) + 'vh';
      s.style.animationDelay = rand(0, 3) + 's';
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
