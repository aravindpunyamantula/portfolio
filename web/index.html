  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0B0F19;
      height: 100%;
      overflow: hidden;
      /* Stop trackpad horizontal swipes / edge drags from triggering the
         browser's back-forward navigation gesture, and rubber-band pulls
         from refreshing on mobile. */
      overscroll-behavior: none;
    }
    /* The splash mirrors the Flutter hero in plain HTML/CSS, so the
       browser paints real content in the first frames — this is what
       Lighthouse measures as FCP/LCP, long before the engine boots.
       font-display: swap paints system-font text instantly, then swaps
       to the preloaded Poppins. */
    @font-face {
      font-family: 'Poppins';
      font-weight: 800;
      font-display: swap;
      src: url('assets/assets/fonts/Poppins-ExtraBold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Poppins';
      font-weight: 400;
      font-display: swap;
      src: url('assets/assets/fonts/Poppins-Regular.ttf') format('truetype');
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      background:
        radial-gradient(600px 400px at 20% 15%, rgba(99, 102, 241, 0.10), transparent 70%),
        radial-gradient(500px 380px at 80% 75%, rgba(139, 92, 246, 0.08), transparent 70%),
        #0B0F19;
      z-index: 9999;
      transition: opacity 0.4s ease;
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    }
    #loading .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      letter-spacing: 1px;
    }
    #loading .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34D399;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #loading .hi {
      margin-top: 26px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 16px;
      letter-spacing: 2px;
    }
    #loading h1 {
      margin: 10px 0 0;
      font-size: clamp(34px, 7vw, 64px);
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: 0.5px;
      background: linear-gradient(120deg, #FFFFFF 30%, #B8BCFF 75%, #8B5CF6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #FFFFFF; /* fallback */
    }
    #loading .role {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.55);
      font-size: clamp(14px, 2.4vw, 18px);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #loading .bar {
      margin-top: 40px;
      width: 150px;
      height: 2px;
      border-radius: 2px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.10);
    }
    #loading .bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      border-radius: 2px;
      background: #6366F1;
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.35; } }
    @keyframes slide {
      0% { transform: translateX(-60px); }
      100% { transform: translateX(160px); }
    }
  </style>
</head>
